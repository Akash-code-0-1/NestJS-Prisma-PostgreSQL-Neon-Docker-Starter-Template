services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      redis:
        condition: service_started
        required: true
    environment:
      DATABASE_URL: postgresql://neondb_owner:npg_Ndom9Oczn8MB@ep-shiny-rain-aiv0dkzc-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "3001:3000"
    restart: always
    volumes:
      - .:/app:cached
    command: npm run start:dev

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: always