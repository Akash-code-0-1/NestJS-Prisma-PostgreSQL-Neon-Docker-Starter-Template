services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      redis:
        condition: service_started
        required: true
    environment:
      DATABASE_URL: postgresql://neondb_owner:npg_Ndom9Oczn8MB@ep-shiny-rain-aiv0dkzc-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # PM2 Plus Keys from your screenshot
      PM2_PUBLIC_KEY: ${PM2_PUBLIC_KEY}
      PM2_SECRET_KEY: ${PM2_SECRET_KEY}
    ports:
      - "3001:3000"
      - "9229:9229"
    restart: always
    volumes:
      - .:/app:cached
      - /app/node_modules
    # Point command to PM2 instead of start:debug
    command: pm2-runtime start dist/src/main.js --name "domenico-api" -i 1 --watch dist

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: always