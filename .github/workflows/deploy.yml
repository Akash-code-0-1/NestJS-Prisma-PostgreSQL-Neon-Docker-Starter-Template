name: Production CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted   # <-- use your self-hosted runner
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Login to Docker Hub
      - name: Login to Docker Hub
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/domenico-backend:latest .

      # Push Docker image to Docker Hub
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/domenico-backend:latest

      # Deploy locally on the runner
      - name: Deploy Docker containers
        run: |
          cd ~/app                     # <-- path on your Ubuntu PC where docker-compose.prod.yml is
          docker-compose -f docker-compose.prod.yml pull
          docker-compose -f docker-compose.prod.yml up -d