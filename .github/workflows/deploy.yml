name: Production CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted  # your self-hosted runner
    steps:
      # 1️⃣ Checkout repository
      - uses: actions/checkout@v4

      # 2️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # 3️⃣ Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/domenico-backend:latest . || exit 1

      # 4️⃣ Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/domenico-backend:latest || exit 1

      # 5️⃣ Deploy Docker containers locally
      - name: Deploy Docker containers
        run: |
          cd ~/app || exit 1   # <-- path on your Ubuntu PC where docker-compose.prod.yml is

          # Stop and remove old containers to avoid name conflicts
          docker rm -f domenico-backend || true
          docker rm -f app-redis-1 || true

          # Alternatively, stop everything from this compose file (safer)
          # docker-compose -f docker-compose.prod.yml down

          # Pull latest images
          docker-compose -f docker-compose.prod.yml pull || exit 1

          # Start containers fresh
          docker-compose -f docker-compose.prod.yml up -d --remove-orphans || exit 1